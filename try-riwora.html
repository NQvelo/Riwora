<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Try Riwora</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Link to your CSS file -->
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="logo">
        <img src="assets/logo.png" alt="Riwora Logo" />
      </div>
      <nav class="navigation">
        <ul>
          <li><a href="product.html">Product</a></li>
          <li><a href="pricing.html">Pricing</a></li>
          <li><a href="try-riwora.html">Try Riwora</a></li>
        </ul>
      </nav>
    </header>

    <!-- Main Content for Try Riwora Page -->
    <main>
      <h1>Try Riwora</h1>
      <p>
        Get started with Riwora and see how we can boost your sales by
        automating your client follow-ups.
      </p>
      <form action="https://formspree.io/f/{your-form-id}" method="POST">
        <div class="form-group">
          <input
            type="text"
            name="first-name"
            placeholder="First Name"
            required
          />
          <input
            type="text"
            name="last-name"
            placeholder="Last Name"
            required
          />
        </div>
        <div class="form-group">
          <input type="tel" name="phone" placeholder="Phone Number" required />
          <input type="email" name="email" placeholder="Email" required />
        </div>
        <div class="form-group">
          <textarea
            name="note"
            rows="4"
            placeholder="Note (optional)"
          ></textarea>
        </div>
        <input type="submit" value="Submit" />
      </form>
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; 2024 Riwora. All rights reserved.</p>
    </footer>
  </body>
</html>
